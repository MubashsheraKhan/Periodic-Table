<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Periodic Table Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --text: #f8fafc;
            /* Professional Color Palette */
            --alkali: #f87171;
            --alkaline: #fb923c;
            --transition: #fbbf24;
            --post-transition: #4ade80;
            --metalloid: #2dd4bf;
            --nonmetal: #60a5fa;
            --noble: #a78bfa;
            --lanthanide: #f472b6;
            --actinide: #fb7185;
            --unknown: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        h1 { font-weight: 800; letter-spacing: -1px; margin: 0 0 20px 0; color: #38bdf8; }

        /* Periodic Table Grid */
        .periodic-table {
            display: grid;
            grid-template-columns: repeat(18, minmax(50px, 1fr));
            grid-template-rows: repeat(10, auto);
            gap: 4px;
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        /* The Dashboard (In the blank space of Period 1 & 2) */
        #dashboard {
            grid-column: 3 / 13;
            grid-row: 1 / 4;
            background: var(--panel);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            padding: 20px;
            margin: 5px;
            align-items: center;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
        }

        .dash-symbol { font-size: 5rem; font-weight: 800; margin-right: 25px; line-height: 1; min-width: 120px; text-align: center;}
        .dash-info h2 { margin: 0; font-size: 1.8rem; color: #fff; }
        .dash-details { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; font-size: 0.9rem; color: #94a3b8; }
        .dash-details span { color: var(--text); font-weight: 600; }

        /* Element Cells */
        .element {
            aspect-ratio: 1;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: default;
            transition: all 0.2s ease;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .element:hover {
            transform: scale(1.3);
            z-index: 50;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            border-color: #fff;
        }

        .num { font-size: 0.65rem; position: absolute; top: 3px; left: 4px; opacity: 0.7; }
        .sym { font-size: 1.1rem; font-weight: 800; }
        .name { font-size: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

        /* Type Colors */
        .alkali { background: var(--alkali); color: #000; }
        .alkaline { background: var(--alkaline); color: #000; }
        .transition { background: var(--transition); color: #000; }
        .post-transition { background: var(--post-transition); color: #000; }
        .metalloid { background: var(--metalloid); color: #000; }
        .nonmetal { background: var(--nonmetal); color: #000; }
        .noble { background: var(--noble); color: #000; }
        .lanthanide { background: var(--lanthanide); color: #000; }
        .actinide { background: var(--actinide); color: #000; }

        .empty { pointer-events: none; }
        
        /* Spacing for f-block */
        .f-spacer { grid-row: 8; height: 20px; }
    </style>
</head>
